<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>variables</title>
</head>
<body>
    <div class="idk">
        <h1>
            <p>Ever tried. Ever failed. No matter. Try again. Fail again. Fail better.</p>
        </h1>
        <hr>
        <marquee scrollamount="10">CHAPA</marquee>
        <p id="p-total">R$0.00</p>
        <p>valor venda R$</p>
        <input id="inputsell" type="text">
        <button onclick="licenseandregistration()">cadastration</button>
        <p id="p-total"></p>
        <div>
            <p id="list"></p>
        </div>
        <hr>
        <button onclick="addition()">+</button>
        <button onclick="substraction()">-</button>
        <button onclick="multiplication()">×</button>
        <button onclick="division()">÷</button>
        <p id="p-count">
            0
        </p>
        <hr>
        <div>
            <h3>
                <p>dices n stuff 🎲</p>
            </h3>
            <button onclick="resetrolls()">reset</button>
            <p id="p-rolls"> total rolls: 0</p>
            <p id="p-random">last roll: 0</p>
            <button onclick="dicerolls(4)">D4</button>
            <button onclick="dicerolls(6)">D6</button>
            <button onclick="dicerolls(8)">D8</button>
            <button onclick="dicerolls(10)">D10</button>
            <button onclick="dicerolls(12)">D12</button>
            <button onclick="dicerolls(20)">D20</button>
        </div>
        <hr>
        <div>
            <h4>
                <p>change the language</p>
            </h4>
            <div class="demo">
                <div>
                    <table class="lang">
                        <tr>
                            <td class="tdlang">
                                <span id="en" class="button_lang current_lang">EN</span>
                            </td>
                            <td class="tdlang"><span id="de" class="button_lang">DE</span></td>
                            <td class="tdlang"><span id="bu" class="button_lang">BU</span></td>
                            <td class="tdlang"><span id="no" class="button_lang">NO</span></td>
                        </tr>
                    </table>
                    <p class="translation english" id="translate">
                        this text will change
                    </p>
                </div>
            </div>
        </div>
        <hr>
        <button onclick="forloop()">for loop</button>
        <h5>
            <p id="thing"></p>
        </h5>
    </div>
    <script src="script.js"></script>
</body>
</html>
