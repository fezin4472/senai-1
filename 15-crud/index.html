<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>crud</title>
</head>
<body>
    <h1>CREATE READ UPDATE DELETE</h1>

    <div id="form">
        <div class="container-inputs">
            <label for="input-carro">carro:</label>
            <input id="input-carro" placeholder="digite um carro" type="text">
        </div>
        <div class="container-inputs">
            <label for="">potência:</label>
            <input id="input-potencia" placeholder="digite a potência em cavalos" type="number">
        </div>
        <div class="container-inputs">
            <label for="">cor:</label>
            <input id="input-cor" placeholder="digite a cor" type="text">
        </div>
        <div class="container-inputs">
            <label for="">ano:</label>
            <input id="input-ano" placeholder="digite o ano" type="number">
        </div>
        <div class="container-inputs">
            <label for="">fipe:</label>
            <input id="input-fipe" placeholder="digite a tabela fipe" type="number">
        </div>
        <div class="container-inputs">
            <label for="">id:</label>
            <input id="input-id" placeholder="digite o id" type="text">
        </div>

        <button class="btn" onclick="register()">
            <div class="inner">
                <div class="top-white"></div>
                <span class="text">adicionar +</span>
            </div>
        </button>
        <button class="btn" onclick="save()">
            <div class="inner">
                <div class="top-white"></div>
                <span class="text">salvar 💾</span>
            </div>
        </button>
        <button class="btn" onclick="del()">
            <div class="inner">
                <div class="top-white"></div>
                <span class="text">excluir 🗑️</span>
            </div>
        </button>

    </div>

    <div class="buttons">
        <button class="btn" onclick="show()">
            <div class="inner">
                <div class="top-white"></div>
                <span class="text">mostrar carros</span>
            </div>
        </button>
        <button class="btn" onclick="test()">
            <div class="inner">
                <div class="top-white"></div>
                <span class="text">testar</span>
            </div>
        </button>
        <button class="btn" onclick="clearform()">
            <div class="inner">
                <div class="top-white"></div>
                <span class="text">limpar carros</span>
            </div>
        </button>
        <button class="btn" onclick="">
            <div class="inner">
                <div class="top-white"></div>
                <span class="text">pesquisar 🔍</span>
            </div>
        </button>
    </div>

    <div id="panel">
        nada aqui
    </div>

    <p>esse site foi feito na estética da internet frutiger aero</p>

    <script src="script.js"></script>
</body>
</html>
