<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>JOGO DO DINO DONA BET</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="container">
    <h1>🦖 JOGO DO DINO DONA BET 🦕</h1>

    <marquee scrollamount="10">
      GANHE DINOCOINS OU PERCA
    </marquee>

    <div class="gif">☄️</div>

    <div class="counter">
      DinoCoins: <span id="coins">100</span>
    </div>

    <div class="dinos">
      <div class="dino" onclick="selectDino('T-Rex')">
        <h2>T-Rex</h2>
      </div>

      <div class="dino" onclick="selectDino('Velociraptor')">
        <h2>Velociraptor</h2>
      </div>

      <div class="dino" onclick="selectDino('Triceratops')">
        <h2>Triceratops</h2>
      </div>

      <div class="dino" onclick="selectDino('Pterodáctilo')">
        <h2>Pterodáctilo</h2>
      </div>
    </div>

    <div style="text-align:center;">
      <button onclick="spinGame()">🎰 GIRAR A SORTE 🎰</button>
    </div>

    <div class="result" id="result">
      Escolha um dinossauro e tente a sorte!
    </div>

    <div class="footer">
      <p>Site estilo Web 1.0 • Feito com pura energia jurássica • 2003 FOREVER</p>
      <p>⚠️ Apenas uma brincadeira fictícia sem apostas reais.</p>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
